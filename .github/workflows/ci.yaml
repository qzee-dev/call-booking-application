name: Nx Continuous Integration

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]


jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # 🔥 Cache pnpm store
      - name: Cache pnpm store
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ✅ Let Nx compute base/head correctly
      - uses: nrwl/nx-set-shas@v4

      - name: Debug affected apps
        run: pnpm nx show projects --affected
      
      - name: Detect affected apps
        run: pnpm nx show projects --affected --base=origin/development --head=HEAD


      - name: Lint affected
        run: pnpm nx affected --target=lint --base=origin/development --head=HEAD

      - name: Test affected
        run: pnpm nx affected --target=test --coverage --base=origin/development --head=HEAD

      - name: Build affected
        run: pnpm nx affected --target=build --base=origin/development --head=HEAD
