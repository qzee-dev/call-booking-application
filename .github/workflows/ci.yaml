name: CI Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - "user-ui/**"
      - "user-api/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"

  pull_request:
    branches: ["main"]
    paths:
      - "user-api/**"
      - "user-ui/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=my-nodejs-app
            -Dsonar.organization=my-org
            -Dsonar.sources=.
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
