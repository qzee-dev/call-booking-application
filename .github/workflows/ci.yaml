name: Nx Continuous Integration

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ✅ Let Nx compute base/head correctly
      - uses: nrwl/nx-set-shas@v4

      - name: Debug affected apps (temporary but recommended)
        run: pnpm nx print-affected --select=projects

      - name: Lint affected
        run: pnpm nx affected --target=lint

      - name: Test affected
        run: pnpm nx affected --target=test --coverage

      - name: Build affected
        run: pnpm nx affected --target=build
