name: CI Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - "user-ui/**"
      - "user-api/**"
      - "admin-ui/**"
      - ".github/workflows/**"

  pull_request:
    branches: ["main"]
    paths:
      - "user-ui/**"
      - "user-api/**"
      - "admin-ui/**"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.set.outputs.apps }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed apps
        id: set
        run: |
          APPS=()

          git diff --name-only ${{ github.event.before }} ${{ github.sha }} | while read file; do
            if [[ $file == user-ui/* ]]; then
              APPS+=("user-ui")
            elif [[ $file == user-api/* ]]; then
              APPS+=("user-api")
            elif [[ $file == admin-ui/* ]]; then
              APPS+=("admin-ui")
            fi
          done

          # Remove duplicates
          UNIQUE=$(printf "%s\n" "${APPS[@]}" | sort -u | jq -R . | jq -s .)

          echo "apps=$UNIQUE" >> $GITHUB_OUTPUT

  ci:
    needs: detect-changes
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.apps) }}

    name: CI – ${{ matrix.app }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.app }}
        run: npm test -- --coverage

      - name: Run ESLint
        working-directory: ${{ matrix.app }}
        run: npm run lint

      - name: Check formatting
        working-directory: ${{ matrix.app }}
        run: npm run format:check

      - name: SonarQube Scan
        working-directory: ${{ matrix.app }}
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=${{ matrix.app }}
            -Dsonar.organization=my-org
            -Dsonar.sources=.
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
