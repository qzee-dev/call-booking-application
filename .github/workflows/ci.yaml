name: CI Pipeline 

on:
  push:
    branches: ["main"]
    paths:
      - "user-ui/**"
      - "user-api/**"
      - "admin-ui/**"
      - ".github/workflows/**"
  pull_request:
    branches: ["main"]
    paths:
      - "user-ui/**"
      - "user-api/**"
      - "admin-ui/**"
jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app:
          - user-ui
          - user-api
          - admin-ui

    name: CI – ${{ matrix.app }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.app }}
        run: npm test -- --coverage

      - name: Run ESLint
        working-directory: ${{ matrix.app }}
        run: npm run lint

      - name: Check formatting
        working-directory: ${{ matrix.app }}
        run: npm run format:check

      - name: SonarQube Scan
        working-directory: ${{ matrix.app }}
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=${{ matrix.app }}
            -Dsonar.organization=my-org
            -Dsonar.sources=.
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
