name: Nx Continuous Integration

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # REQUIRED for nx affected

      # ✅ Install pnpm first
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      # ✅ Setup Node + pnpm cache
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ✅ Nx base/head
      - name: Set Nx base and head
        run: |
          echo "BASE=origin/main" >> $GITHUB_ENV
          echo "HEAD=HEAD" >> $GITHUB_ENV

      - name: Lint affected
        run: pnpm nx affected --target=lint --base=$BASE --head=$HEAD

      - name: Test affected
        run: pnpm nx affected --target=test --base=$BASE --head=$HEAD --coverage

      - name: Build affected
        run: pnpm nx affected --target=build --base=$BASE --head=$HEAD

