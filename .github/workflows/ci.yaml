name: CI Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - "apps/**"
      - ".github/workflows/**"

  pull_request:
    branches: ["main"]
    paths:
      - "apps/**"

jobs:
  # 🔍 Detect which apps changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.set-matrix.outputs.apps }}

    steps:
      - uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            user-ui:
              - "apps/user-ui/**"
            user-api:
              - "apps/user-api/**"
            admin-ui:
              - "apps/admin-ui/**"
            admin-api:
              - "apps/admin-api/**"

      - name: Build dynamic matrix
        id: set-matrix
        run: |
          apps=()

          [[ "${{ steps.filter.outputs.user-ui }}" == "true" ]] && apps+=("\"user-ui\"")
          [[ "${{ steps.filter.outputs.user-api }}" == "true" ]] && apps+=("\"user-api\"")
          [[ "${{ steps.filter.outputs.admin-ui }}" == "true" ]] && apps+=("\"admin-ui\"")
          [[ "${{ steps.filter.outputs.admin-api }}" == "true" ]] && apps+=("\"admin-api\"")

          echo "apps=[${apps[*]}]" >> $GITHUB_OUTPUT

  # 🚀 Run CI only for changed apps
  ci:
    needs: detect-changes
    runs-on: ubuntu-latest

    # Skip if nothing changed
    if: needs.detect-changes.outputs.apps != '[]'

    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.apps) }}

    name: CI – ${{ matrix.app }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: Run tests with coverage
        working-directory: apps/${{ matrix.app }}
        run: npm test -- --coverage --passWithNoTests

      # Optional lint
      # - name: Run ESLint
      #   working-directory: apps/${{ matrix.app }}
      #   run: npm run lint

      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: apps/${{ matrix.app }}
          args: >
            -Dsonar.projectKey=${{ matrix.app }}
            -Dsonar.organization=my-org
            -Dsonar.sources=.
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
```
