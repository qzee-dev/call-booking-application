name: Docker Build Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]   # triggered after CI
    types:
      - completed

  workflow_dispatch:             # manual trigger
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"

jobs:
  build:
    # ✅ Only run if CI passed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(github.event.workflow_run.outputs.apps) }}

    name: Docker Build – ${{ matrix.app }}

    env:
      # 🔹 Variables for clarity
      APP_NAME: my-nodejs-app
      APP_FOLDER: ${{ matrix.app }}
      ENVIRONMENT: ${{ github.event.inputs.environment }}
      TAG: ${{ github.run_number }}-${{ github.sha :: 7 }}
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}-${{ matrix.app }}

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ DockerHub login
      - name: DockerHub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3️⃣ Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ env.TAG }} \
            --label "app=${{ env.APP_NAME }}" \
            --label "service=${{ matrix.app }}" \
            --label "env=${{ env.ENVIRONMENT }}" \
            ./${{ env.APP_FOLDER }}

      # 4️⃣ Push image to DockerHub
      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.TAG }}
