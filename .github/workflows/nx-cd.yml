name: Nx Continuous Deployment

on:
workflow_run:
workflows: ["Nx Continuous Integration"]
types: [completed]
branches: [main]

workflow_dispatch:  # allow manual deploy

jobs:
cd:
name: Continuous Deployment
runs-on: ubuntu-latest

```
# ✅ Only deploy if CI succeeded OR manual run
if: >
  github.event_name == 'workflow_dispatch' ||
  github.event.workflow_run.conclusion == 'success'

steps:
  - name: Checkout repository
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Setup pnpm
    uses: pnpm/action-setup@v3
    with:
      version: 9

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20
      cache: pnpm

  - name: Install dependencies
    run: pnpm install --frozen-lockfile

  - uses: nrwl/nx-set-shas@v4

  # ✅ Docker image versioning
  - name: Set Docker Tag
    run: |
      TAG=${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}
      echo "TAG=$TAG" >> $GITHUB_ENV

  # ✅ Login to Docker registry
  - name: Docker Login
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  # ✅ Build Docker images (affected only)
  - name: Build Docker images
    run: pnpm nx affected --target=docker-build

  # ✅ Push Docker images (affected only)
  - name: Push Docker images
    run: pnpm nx affected --target=docker-push
```
