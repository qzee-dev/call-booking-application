
spring:
  application:
    name: api-gateway
    
server:
  port: 8085

app:
  config:
    keycloak:
      url: http://host.docker.internal:8080
      realm: banking-service

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8080/eureka


spring:
  application:
    name: api-gateway

  security:
    enabled: true   # ✅ stays here

    oauth2:
      client:
        provider:
          keycloak:
            token-uri: ${app.config.keycloak.url}/realms/${app.config.keycloak.realm}/protocol/openid-connect/token
            authorization-uri: ${app.config.keycloak.url}/realms/${app.config.keycloak.realm}/protocol/openid-connect/auth
            user-name-attribute: preferred_username
            user-info-uri: ${app.config.keycloak.url}/realms/${app.config.keycloak.realm}/protocol/openid-connect/userinfo
            jwk-set-uri: ${app.config.keycloak.url}/realms/${app.config.keycloak.realm}/protocol/openid-connect/certs

        registration:
          banking-service-client:
            provider: keycloak
            client-id: banking-service-client
            client-secret: XbEay2NJMxYzieK8NSIkZHDpzD6EVQtN
            authorization-grant-type: authorization_code
            redirect-uri: http://host.docker.internal:8080/login/oauth2/code/keycloak
            scope: openid

      resourceserver:
        jwt:
          jwk-set-uri: ${app.config.keycloak.url}/realms/${app.config.keycloak.realm}/protocol/openid-connect/certs

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/users/**

        - id: fund-transfer-service
          uri: http://fund-transfer-service:8080
          predicates:
            - Path=/api/fund-transfers/**

        - id: account-service
          uri: http://account-service:8080
          predicates:
            - Path=/accounts/**

        - id: sequence-generator
          uri: http://sequence-generator:8080
          predicates:
            - Path=/sequence/**

        - id: transaction-service
          uri: http://transaction-service:8080
          predicates:
            - Path=/transactions/**


